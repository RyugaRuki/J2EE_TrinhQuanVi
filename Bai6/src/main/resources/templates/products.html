<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
     <html xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<title>Product List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Product Management</h2>

<div class="d-flex justify-content-between mb-3">
<h4>Product List</h4>

<div sec:authorize="hasRole('ADMIN')">
<a class="btn btn-success" th:href="@{/products/create}">
Create Product
</a>
</div>

<table class="table table-bordered table-hover text-center align-middle">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Image</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="p : ${products}">

<td th:text="${p.id}"></td>

<td th:text="${p.name}"></td>

<td>$<span th:text="${p.price}"></span></td>

<td>
<img th:src="@{'/uploads/' + ${p.image}}"
     width="80"
     class="rounded shadow">
</td>

<td th:text="${p.category != null ? p.category.name : 'No Category'}"></td>

<td>

<div sec:authorize="hasRole('ADMIN')">

<a class="btn btn-warning btn-sm"
th:href="@{'/products/edit/' + ${p.id}}">
Edit
</a>

<a class="btn btn-danger btn-sm"
th:href="@{'/products/delete/' + ${p.id}}">
Delete
</a>

</div>

</td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
